# Run self-hosted Renovate so dependency PRs can refresh generated lock values.
name: Renovate Upgrades (renovate.yml)

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-checks: write
          permission-statuses: write
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write
          permission-administration: read
          permission-vulnerability-alerts: read
          permission-members: ${{ github.event.repository.owner.type == 'Organization' && 'read' || '' }}
          permission-metadata: read
      - name: Run self-hosted Renovate
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          RENOVATE_REPOSITORY: ${{ github.repository }}
        run: PROJECT_CFG_FILE=config/project.cfg make renovate
