# Run the template's test path and generated-repo smoke validation.
name: test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Run tests
        env:
          DOCKER_BUILD_EXTRA_ARGS: --cache-from type=gha,scope=src-image --cache-to type=gha,scope=src-image,mode=max
        run: PROJECT_ENV=project.env.example make test
      - name: Run generated-repo smoke tests
        env:
          DOCKER_BUILD_EXTRA_ARGS: --cache-from type=gha,scope=smoke-image --cache-to type=gha,scope=smoke-image,mode=max
        run: sh scripts/test.sh smoke
