# Run the template's test path and generated-repo smoke validation.
name: test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Run tests
        env:
          DOCKER_BUILD_EXTRA_ARGS: --cache-from type=gha,scope=src-image --cache-to type=gha,scope=src-image,mode=max
        run: PROJECT_CFG_FILE=config/project.cfg make test
      - name: Run generated-repo smoke tests
        env:
          DOCKER_BUILD_EXTRA_ARGS: --cache-from type=gha,scope=smoke-image --cache-to type=gha,scope=smoke-image,mode=max
        run: sh scripts/test.sh smoke
