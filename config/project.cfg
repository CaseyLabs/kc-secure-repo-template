# --- Project Configuration ---
# - Do not store any sensitive values/credentials in this file.

PROJECT_NAME='kc-secure-template'
PROJECT_IMAGE="${PROJECT_NAME}:local"

# Optional: Renovate upgrader tool
# --------------------------------
# - Self-hosted Renovate can automatically update the versions in `project.cfg` by creating GitHub pull requests
DEV_SCAN_ENABLE_RENOVATE=true
# renovate: datasource=docker depName=renovate/renovate versioning=docker
DEV_RENOVATE_IMAGE='renovate/renovate:43.166.3'

# Project base image
# ------------------
PROJECT_DOCKERFILE='Dockerfile'
PROJECT_BUILD_TARGET='dev'
DEV_BASE_IMAGE='debian:trixie-slim'

# renovate: datasource=docker depName=golang versioning=docker
DEV_GO_IMAGE='golang:1.26.3-trixie'
# renovate: datasource=docker depName=python versioning=docker
DEV_PYTHON_IMAGE='python:3.14.0-slim-trixie'
# renovate: datasource=docker depName=node versioning=docker
DEV_NODE_IMAGE='node:24.11.1-trixie-slim'
# renovate: datasource=docker depName=gcr.io/distroless/static-debian13 versioning=docker
DEV_DISTROLESS_STATIC_IMAGE='gcr.io/distroless/static-debian13:nonroot'
# renovate: datasource=docker depName=gcr.io/distroless/python3-debian13 versioning=docker
DEV_DISTROLESS_PYTHON_IMAGE='gcr.io/distroless/python3-debian13:nonroot'
# renovate: datasource=docker depName=gcr.io/distroless/nodejs24-debian13 versioning=docker
DEV_DISTROLESS_NODE_IMAGE='gcr.io/distroless/nodejs24-debian13:nonroot'

# Project workflow commands
# -------------------------
# Commands run inside the selected dev container. Derived repositories can keep
# the root Makefile interface stable by changing these values instead of editing
# every script or GitHub workflow.
PROJECT_BUILD_COMMAND='cd src && go build -trimpath -buildvcs=false ./cmd/app'
PROJECT_LINT_COMMAND='cd src && test -z "$(gofmt -l .)" && go vet ./...'
PROJECT_TEST_COMMAND='cd src && go test -v ./... && go build -trimpath -buildvcs=false ./cmd/app'
PROJECT_RUN_COMMAND='cd src && go run ./cmd/app'
PROJECT_SCAN_IMAGE_VULNS=false
PROJECT_SCAN_IMAGE_TARGET='runtime'

# Security scanners
# -----------------
# renovate: datasource=docker depName=ghcr.io/gitleaks/gitleaks versioning=docker
DEV_SCAN_GITLEAKS_IMAGE='ghcr.io/gitleaks/gitleaks:v8.30.1'

# renovate: datasource=docker depName=rhysd/actionlint versioning=docker
DEV_SCAN_ACTIONLINT_IMAGE='rhysd/actionlint:1.7.12'

# renovate: datasource=docker depName=ghcr.io/zizmorcore/zizmor versioning=docker
DEV_SCAN_ZIZMOR_IMAGE='ghcr.io/zizmorcore/zizmor:1.24.1'

# renovate: datasource=docker depName=aquasec/trivy versioning=docker
DEV_SCAN_TRIVY_IMAGE='aquasec/trivy:0.70.0'

# renovate: datasource=docker depName=anchore/syft versioning=docker
DEV_SCAN_SYFT_IMAGE='anchore/syft:v1.44.0'

# renovate: datasource=docker depName=anchore/grype versioning=docker
DEV_SCAN_GRYPE_IMAGE='anchore/grype:v0.112.0'

# Optional Terraform settings
# ---------------------------
# renovate: datasource=docker depName=hashicorp/terraform versioning=docker
DEV_TERRAFORM_IMAGE='hashicorp/terraform:1.15.2'

# renovate: datasource=terraform-provider depName=integrations/github versioning=hashicorp
DEV_TERRAFORM_GITHUB_PROVIDER_VERSION='6.12.1'

# Optional Kubernetes settings
# ----------------------------
K8S_RELEASE_NAME=''
K8S_NAME_OVERRIDE=''

# - Leave these blank to follow `PROJECT_IMAGE` automatically, including in
#   layered configs that source this file and then override `PROJECT_NAME` or
#   `PROJECT_IMAGE`
# - In a real cluster this usually points at a registry path like:
#   `ghcr.io/org/app` plus a release tag
K8S_IMAGE_REPOSITORY=''
K8S_IMAGE_TAG=''

# Namespace is the Kubernetes "folder" these resources belong to in a cluster.
# - `make k8s` only renders with this value; it does not create the namespace.
K8S_NAMESPACE='default'

# A Helm chart is a package of Kubernetes YAML templates that can be rendered for a specific deployment
K8S_CHART_PATH='config/k8s/chart'
# renovate: datasource=docker depName=alpine/helm versioning=docker
DEV_K8S_HELM_IMAGE='alpine/helm:4.1.4'
DEV_K8S_KUBECTL_IMAGE='bitnami/kubectl:latest'

# Optional extra values file for environment-specific overrides.
# - In Helm, values files are the usual way to change ports, ingress hosts, resources, and similar deployment settings without editing the templates themselves
K8S_VALUES_FILE=''

# SHA Checksum Lockfile
# ---------------------
# (The lockfile is updated via `make update`)
. ./config/lockfile.cfg
